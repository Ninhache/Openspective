name: Release

# Build and publish the container image to GHCR on a version tag (vX.Y.Z),
# or on demand via the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Free up runner disk space
        # The image bakes CPU torch + the multilingual model (~GBs); reclaim space
        # the default runner doesn't need so the build doesn't run out of disk.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Derive image tags
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the repo, e.g. ghcr.io/ninhache/openspective
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
